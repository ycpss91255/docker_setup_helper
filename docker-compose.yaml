services:
  ci:
    image: kcov/kcov
    security_opt:
      - seccomp=unconfined
    volumes:
      - .:/source
    working_dir: /source
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        apt-get update -qq && \
        apt-get install -y --no-install-recommends \
            bats \
            bats-support \
            bats-assert \
            shellcheck \
            git \
            ca-certificates && \
        git clone --depth 1 -b v1.2.5 \
            https://github.com/jasonkarns/bats-mock /usr/lib/bats/bats-mock

        echo "--- Running ShellCheck ---"
        find src -name "*.sh" | xargs shellcheck -x

        echo "--- Running Tests & Coverage ---"
        kcov --include-path=./src \
            --exclude-path=test/ \
            ./coverage \
            bats test/

        if [ -n "${HOST_UID}" ] && [ -n "${HOST_GID}" ]; then
            chown -R "${HOST_UID}:${HOST_GID}" coverage/
        fi
        echo "Coverage report: $(pwd)/coverage/index.html"
